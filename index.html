<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z36 Scanner | Fastly IP Finder</title>
    <!-- اضافه کردن فونت‌های حرفه‌ای -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #0ea5e9;
        }
        body { 
            font-family: 'Vazirmatn', 'Inter', sans-serif; 
            background: #020617; 
            color: #f8fafc; 
            min-height: 100vh; 
            transition: all 0.3s ease;
        }
        .glass { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-style { 
            background: #1e293b; 
            border: 1px solid #334155; 
            border-radius: 14px; 
            padding: 12px; 
            width: 100%; 
            outline: none; 
            font-size: 14px; 
            color: #e2e8f0;
            transition: border 0.2s;
        }
        .input-style:focus { border-color: var(--primary); }
        .btn { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border-radius: 16px; 
            font-weight: 800; 
            letter-spacing: -0.025em;
        }
        .btn:active { transform: scale(0.96); }
        .lang-btn { 
            padding: 6px 14px; 
            border-radius: 10px; 
            font-size: 11px; 
            font-weight: 700;
            border: 1px solid #334155; 
            cursor: pointer;
            color: #94a3b8;
            transition: all 0.2s;
        }
        .lang-btn.active { 
            background: var(--primary); 
            border-color: var(--primary); 
            color: white;
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.4);
        }
        h1 { font-family: 'Inter', 'Vazirmatn', sans-serif; letter-spacing: -0.05em; }
        .font-mono { font-family: 'Inter', monospace; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-xl mx-auto">
        <!-- Language Switcher -->
        <div class="flex justify-center gap-3 mb-10">
            <button onclick="setLanguage('fa')" class="lang-btn active" id="lang-fa">FA</button>
            <button onclick="setLanguage('en')" class="lang-btn" id="lang-en">EN</button>
            <button onclick="setLanguage('ru')" class="lang-btn" id="lang-ru">RU</button>
            <button onclick="setLanguage('cn')" class="lang-btn" id="lang-cn">CN</button>
        </div>

        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-5xl font-black text-white mb-2">Z36 SCANNER</h1>
            <p id="sub-title" class="text-sky-500 font-bold text-xs uppercase tracking-[0.2em]">FASTLY CLEAN IP FINDER</p>
        </div>

        <!-- Settings Card -->
        <div class="glass p-8 rounded-[32px] space-y-6">
            <div class="grid grid-cols-2 gap-5">
                <div>
                    <label id="lbl-latency" class="block text-[11px] font-bold mb-2 text-slate-400 uppercase tracking-wider">تأخیر مجاز (ms)</label>
                    <input type="number" id="maxLatency" value="400" class="input-style font-mono">
                </div>
                <div>
                    <label id="lbl-target" class="block text-[11px] font-bold mb-2 text-slate-400 uppercase tracking-wider">تعداد هدف</label>
                    <input type="number" id="targetCount" value="10" class="input-style font-mono">
                </div>
            </div>

            <div>
                <label id="lbl-range" class="block text-[11px] font-bold mb-2 text-slate-400 uppercase tracking-wider">رنج آی‌پی دست‌ساز</label>
                <input type="text" id="customRange" class="input-style font-mono" placeholder="151.101.0.0/16">
            </div>

            <div class="flex gap-4 pt-2">
                <button id="startBtn" onclick="startScan()" class="btn flex-1 bg-sky-600 hover:bg-sky-500 py-4 shadow-lg shadow-sky-900/40 text-white">شروع اسکن</button>
                <button id="stopBtn" onclick="stopScan()" class="btn hidden bg-red-600 hover:bg-red-500 px-8 py-4 text-white">توقف</button>
            </div>
        </div>

        <!-- Progress Area -->
        <div id="progressArea" class="hidden mt-8">
            <div class="flex justify-between items-center mb-2 px-1">
                <span id="statusText" class="text-[11px] font-bold text-slate-400">...</span>
                <span id="percentText" class="text-[11px] font-mono text-sky-500">0%</span>
            </div>
            <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                <div id="progressBar" class="bg-sky-500 h-full w-0 transition-all duration-300"></div>
            </div>
        </div>

        <!-- Results -->
        <div class="mt-12">
            <div class="flex justify-between items-end mb-6 px-1">
                <h3 id="lbl-results" class="text-lg font-black">نتایج پیدا شده</h3>
                <div class="text-3xl font-black text-sky-500 font-mono" id="foundCount">0</div>
            </div>
            <div id="results" class="grid gap-4"></div>
        </div>
    </div>

    <script>
        let isScanning = false;
        let cleanFound = 0;
        let currentLang = 'fa';

        const translations = {
            fa: {
                title: "جستجوگر آی‌پی تمیز فستلی",
                latency: "تأخیر مجاز (ms)",
                target: "تعداد هدف",
                range: "رنج آی‌پی دست‌ساز",
                range_ph: "مثلاً: 151.101.0.0/16",
                start: "شروع اسکن",
                stop: "توقف",
                results: "نتایج پیدا شده",
                fetching: "در حال دریافت لیست رنج‌ها...",
                testing: "تست آی‌پی: ",
                finished: "اسکن پایان یافت.",
                copy: "کپی",
                copied: "کپی شد!"
            },
            en: {
                title: "FASTLY CLEAN IP FINDER",
                latency: "MAX LATENCY (MS)",
                target: "TARGET COUNT",
                range: "CUSTOM IP RANGE",
                range_ph: "e.g. 151.101.0.0/16",
                start: "START SCAN",
                stop: "STOP",
                results: "RESULTS FOUND",
                fetching: "Fetching IP ranges...",
                testing: "Testing IP: ",
                finished: "Scan completed.",
                copy: "COPY",
                copied: "COPIED!"
            },
            ru: {
                title: "ПОИСК ЧИСТЫХ IP FASTLY",
                latency: "МАКС. ЗАДЕРЖКА (MS)",
                target: "ЦЕЛЬ",
                range: "СВОЙ ДИАПАЗОН IP",
                range_ph: "напр. 151.101.0.0/16",
                start: "ПУСК",
                stop: "СТОП",
                results: "НАЙДЕНО",
                fetching: "Получение списка...",
                testing: "Тест IP: ",
                finished: "Завершено.",
                copy: "КОПИРОВАТЬ",
                copied: "СКОПИРОВАНО!"
            },
            cn: {
                title: "FASTLY 干净 IP 查找器",
                latency: "最大延迟 (毫秒)",
                target: "目标数量",
                range: "自定义 IP 范围",
                range_ph: "例如: 151.101.0.0/16",
                start: "开始扫描",
                stop: "停止",
                results: "发现结果",
                fetching: "正在获取列表...",
                testing: "正在测试 IP: ",
                finished: "扫描完成。",
                copy: "复制",
                copied: "已复制!"
            }
        };

        function setLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            const isRtl = (lang === 'fa');
            document.documentElement.dir = isRtl ? 'rtl' : 'ltr';
            
            document.getElementById('sub-title').innerText = t.title;
            document.getElementById('lbl-latency').innerText = t.latency;
            document.getElementById('lbl-target').innerText = t.target;
            document.getElementById('lbl-range').innerText = t.range;
            document.getElementById('customRange').placeholder = t.range_ph;
            document.getElementById('startBtn').innerText = t.start;
            document.getElementById('stopBtn').innerText = t.stop;
            document.getElementById('lbl-results').innerText = t.results;
            
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('lang-' + lang).classList.add('active');
        }

        async function fetchFastlyIPs() {
            try {
                const response = await fetch('https://api.fastly.com/public-ip-list');
                const data = await response.json();
                return data.addresses;
            } catch (e) {
                return ["151.101.0.0/16", "199.232.0.0/16", "157.185.0.0/16"];
            }
        }

        function cidrToIps(cidr) {
            let [range] = cidr.split('/');
            let parts = range.split('.');
            if(parts.length < 4) return [];
            let ips = [];
            for(let i=0; i<12; i++) {
                ips.push(`${parts[0]}.${parts[1]}.${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 254) + 1}`);
            }
            return ips;
        }

        async function startScan() {
            isScanning = true;
            cleanFound = 0;
            const t = translations[currentLang];
            document.getElementById('results').innerHTML = "";
            document.getElementById('foundCount').innerText = "0";
            document.getElementById('startBtn').classList.add('hidden');
            document.getElementById('stopBtn').classList.remove('hidden');
            document.getElementById('progressArea').classList.remove('hidden');

            const statusText = document.getElementById('statusText');
            const target = parseInt(document.getElementById('targetCount').value);
            const maxLat = parseInt(document.getElementById('maxLatency').value);
            const customRange = document.getElementById('customRange').value;

            statusText.innerText = t.fetching;
            let ranges = customRange ? [customRange] : await fetchFastlyIPs();
            let allIps = ranges.flatMap(cidrToIps).sort(() => Math.random() - 0.5);

            for (let i = 0; i < allIps.length; i++) {
                if (!isScanning || cleanFound >= target) break;

                let ip = allIps[i];
                statusText.innerText = `${t.testing} ${ip}`;
                let progress = Math.round((i / allIps.length) * 100);
                document.getElementById('progressBar').style.width = progress + "%";
                document.getElementById('percentText').innerText = progress + "%";

                const start = performance.now();
                try {
                    const controller = new AbortController();
                    const id = setTimeout(() => controller.abort(), 1500);
                    await fetch(`https://${ip}/__ping__`, { mode: 'no-cors', signal: controller.signal });
                    const latency = Math.round(performance.now() - start);

                    if (latency <= maxLat) {
                        cleanFound++;
                        addResult(ip, latency);
                        document.getElementById('foundCount').innerText = cleanFound;
                    }
                } catch (e) {}
            }
            stopScan();
            statusText.innerText = t.finished;
            document.getElementById('progressBar').style.width = "100%";
            document.getElementById('percentText').innerText = "100%";
        }

        function stopScan() {
            isScanning = false;
            document.getElementById('startBtn').classList.remove('hidden');
            document.getElementById('stopBtn').classList.add('hidden');
        }

        function addResult(ip, latency) {
            const t = translations[currentLang];
            const container = document.getElementById('results');
            const div = document.createElement('div');
            div.className = "glass p-5 rounded-2xl flex justify-between items-center border-l-4 border-sky-500 animate-in fade-in slide-in-from-right duration-500";
            div.innerHTML = `
                <div class="font-mono text-base font-bold text-slate-100">${ip}</div>
                <div class="flex items-center gap-4">
                    <span class="text-green-400 font-black font-mono text-sm">${latency}ms</span>
                    <button onclick="copyToClipboard('${ip}')" class="bg-slate-800 text-[10px] font-bold px-4 py-2 rounded-xl hover:bg-sky-600 hover:text-white transition-colors">${t.copy}</button>
                </div>
            `;
            container.prepend(div);
        }

        function copyToClipboard(text) {
            const t = translations[currentLang];
            navigator.clipboard.writeText(text);
            const notify = document.createElement('div');
            notify.className = "fixed bottom-5 left-1/2 -translate-x-1/2 bg-sky-500 text-white px-6 py-2 rounded-full text-xs font-bold shadow-lg z-50";
            notify.innerText = t.copied;
            document.body.appendChild(notify);
            setTimeout(() => notify.remove(), 2000);
        }
        
        // اجرای پیش‌فرض فارسی
        setLanguage('fa');
    </script>
</body>
</html>
